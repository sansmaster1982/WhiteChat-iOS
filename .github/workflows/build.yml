name: Build & Upload iOS to App Store

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_NAME: WhiteChat
  BUNDLE_ID: com.whitechat.ios
  SCHEME: WhiteChat

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──
      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      # ── 3. Install XcodeGen ──
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Generate Xcode project ──
      - name: Generate Xcode project
        run: xcodegen generate

      # ── 5. Resolve Swift Package dependencies ──
      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }}

      # ── 6. Set unique build number ──
      - name: Set build number
        run: |
          BUILD_NUMBER=$(date +%y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" WhiteChat/Info.plist
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "Build number: $BUILD_NUMBER"

      # ── 7. Install Apple certificate and provisioning profile ──
      - name: Install signing credentials
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "Profile UUID: $PROFILE_UUID"

      # ── 8. Detect signing identity ──
      - name: Detect signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db \
            | grep "iPhone Distribution\|Apple Distribution" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Signing identity: $IDENTITY"

      # ── 9. Patch project for manual signing (app target only) ──
      - name: Patch signing in Xcode project
        run: |
          # Use PlistBuddy/sed to set manual signing only for the WhiteChat target
          # This avoids SPM targets inheriting the provisioning profile
          PBXPROJ="${APP_NAME}.xcodeproj/project.pbxproj"

          # Replace Automatic with Manual for the main target
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" "$PBXPROJ"

          # Insert provisioning profile for the main target build configs
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = com.whitechat.ios;/PRODUCT_BUNDLE_IDENTIFIER = com.whitechat.ios; PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_UUID}\"; CODE_SIGN_IDENTITY = \"${SIGNING_IDENTITY}\";/g" "$PBXPROJ"

          echo "Patched project.pbxproj for manual signing"

      # ── 10. Archive ──
      - name: Archive
        run: |
          xcodebuild archive \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO

      # ── 11. Create ExportOptions.plist ──
      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ env.PROFILE_UUID }}</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST

      # ── 12. Export & Upload to App Store Connect ──
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      # ── 13. Cleanup keychain ──
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
